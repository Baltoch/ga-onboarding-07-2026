name: 'Build CI'

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4
      - name: 'Check App Verion'
        run: echo "Application version $(cat version.txt)"
      - name: 'Build code'
        id: build_step
        run: |
          VERSION=$(cat version.txt)
          ARTIFACT="artifact_${VERSION}"
          zip -r "scripts/${ARTIFACT}.zip" scripts/
          echo "artifact_name=$ARTIFACT" >> "$GITHUB_OUTPUT"
      - name: 'Upload artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_step.outputs.artifct_name }}
          path: scripts/*.zip
